aid: aws-app-mesh
name: AWS App Mesh
description: >-
  AWS App Mesh is a service mesh that provides application-level networking to
  make it easy for your services to communicate with each other across multiple
  types of compute infrastructure. App Mesh standardizes how your services
  communicate, giving you end-to-end visibility and helping to ensure high
  availability for your applications.
