    name: AWS App Mesh API
    description: >-
      API for creating and managing App Mesh service meshes, virtual services,
      virtual nodes, virtual routers, routes, and gateway routes. The service
      is based on Envoy proxy and provides service discovery, traffic routing,
      and observability for microservices.
