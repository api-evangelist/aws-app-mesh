aid: aws-app-mesh
name: AWS App Mesh
description: >-
  AWS App Mesh is a service mesh based on the Envoy proxy that provides
  application-level networking to make it easy for services to communicate with
  each other across multiple types of compute infrastructure including Amazon
  ECS, EKS, EC2, and Fargate. App Mesh standardizes service communication,
  giving end-to-end visibility and helping ensure high availability. Note: AWS
  App Mesh is deprecated; Amazon ECS Service Connect is the recommended
  replacement for new workloads.
