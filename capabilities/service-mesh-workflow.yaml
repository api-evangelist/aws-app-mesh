naftiko: 1.0.0-alpha2
info:
  label: AWS App Mesh Service Mesh Workflow
  description: 'Workflow capability for platform engineers to manage App Mesh service meshes, virtual nodes, virtual services,
    and traffic routing. Note: AWS App Mesh is deprecated; Amazon ECS Service Connect is the recommended replacement for new
    deployments.'
  tags:
  - AWS App Mesh
  - AWS
  - Service Mesh
  - Microservices
  - Networking
  - Deprecated
  created: '2026-04-19'
  modified: '2026-05-06'
binds:
- namespace: env
  keys:
    AWS_ACCESS_KEY_ID: AWS_ACCESS_KEY_ID
    AWS_SECRET_ACCESS_KEY: AWS_SECRET_ACCESS_KEY
    AWS_REGION: AWS_REGION
capability:
  consumes:
  - type: http
    namespace: app-mesh
    baseUri: https://appmesh.{region}.amazonaws.com
    description: AWS App Mesh control plane API
    authentication:
      type: apikey
      key: Authorization
      value: '{{AWS_SIGV4_TOKEN}}'
      placement: header
    resources:
    - name: meshes
      path: /v20190125/meshes
      description: Manage service meshes
      operations:
      - name: list-meshes
        method: GET
        description: List all service meshes in the account
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
      - name: create-mesh
        method: PUT
        description: Create a new service mesh
        body:
          type: json
          data:
            meshName: '{{tools.mesh_name}}'
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
    - name: virtual-nodes
      path: /v20190125/meshes/{meshName}/virtualNodes
      description: Manage virtual nodes within a mesh
      operations:
      - name: list-virtual-nodes
        method: GET
        description: List virtual nodes in a mesh
        inputParameters:
        - name: meshName
          in: path
          type: string
          required: true
          description: The name of the service mesh
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
    - name: virtual-services
      path: /v20190125/meshes/{meshName}/virtualServices
      description: Manage virtual services
      operations:
      - name: list-virtual-services
        method: GET
        description: List virtual services in a mesh
        inputParameters:
        - name: meshName
          in: path
          type: string
          required: true
          description: The name of the service mesh
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
    - name: virtual-routers
      path: /v20190125/meshes/{meshName}/virtualRouters
      description: Manage virtual routers
      operations:
      - name: list-virtual-routers
        method: GET
        description: List virtual routers in a mesh
        inputParameters:
        - name: meshName
          in: path
          type: string
          required: true
          description: The name of the service mesh
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
    - name: virtual-gateways
      path: /v20190125/meshes/{meshName}/virtualGateways
      description: Manage virtual gateways
      operations:
      - name: list-virtual-gateways
        method: GET
        description: List virtual gateways in a mesh
        inputParameters:
        - name: meshName
          in: path
          type: string
          required: true
          description: The name of the service mesh
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
  exposes:
  - type: rest
    port: 8080
    namespace: app-mesh-workflow-api
    description: Unified REST API for AWS App Mesh service mesh management.
    resources:
    - path: /v1/meshes
      name: meshes
      description: Service mesh lifecycle management
      operations:
      - method: GET
        name: list-meshes
        description: List all service meshes
        call: app-mesh.list-meshes
        outputParameters:
        - type: object
          mapping: $.
      - method: POST
        name: create-mesh
        description: Create a new service mesh
        call: app-mesh.create-mesh
        outputParameters:
        - type: object
          mapping: $.
    - path: /v1/meshes/{meshName}/virtual-nodes
      name: virtual-nodes
      description: Virtual node management
      operations:
      - method: GET
        name: list-virtual-nodes
        description: List virtual nodes in a mesh
        call: app-mesh.list-virtual-nodes
        with:
          meshName: rest.meshName
        outputParameters:
        - type: object
          mapping: $.
    - path: /v1/meshes/{meshName}/virtual-services
      name: virtual-services
      description: Virtual service management
      operations:
      - method: GET
        name: list-virtual-services
        description: List virtual services in a mesh
        call: app-mesh.list-virtual-services
        with:
          meshName: rest.meshName
        outputParameters:
        - type: object
          mapping: $.
    - path: /v1/meshes/{meshName}/virtual-routers
      name: virtual-routers
      description: Virtual router management
      operations:
      - method: GET
        name: list-virtual-routers
        description: List virtual routers in a mesh
        call: app-mesh.list-virtual-routers
        with:
          meshName: rest.meshName
        outputParameters:
        - type: object
          mapping: $.
    - path: /v1/meshes/{meshName}/virtual-gateways
      name: virtual-gateways
      description: Virtual gateway management
      operations:
      - method: GET
        name: list-virtual-gateways
        description: List virtual gateways in a mesh
        call: app-mesh.list-virtual-gateways
        with:
          meshName: rest.meshName
        outputParameters:
        - type: object
          mapping: $.
  - type: mcp
    port: 9090
    namespace: app-mesh-workflow-mcp
    transport: http
    description: MCP server for AI-assisted AWS App Mesh service mesh management.
    tools:
    - name: list-meshes
      description: List all App Mesh service meshes in the AWS account
      hints:
        readOnly: true
        openWorld: true
      call: app-mesh.list-meshes
      outputParameters:
      - type: object
        mapping: $.
    - name: create-mesh
      description: Create a new App Mesh service mesh
      hints:
        readOnly: false
      call: app-mesh.create-mesh
      outputParameters:
      - type: object
        mapping: $.
    - name: list-virtual-nodes
      description: List virtual nodes in a service mesh
      hints:
        readOnly: true
      call: app-mesh.list-virtual-nodes
      outputParameters:
      - type: object
        mapping: $.
    - name: list-virtual-services
      description: List virtual services in a service mesh
      hints:
        readOnly: true
      call: app-mesh.list-virtual-services
      outputParameters:
      - type: object
        mapping: $.
    - name: list-virtual-routers
      description: List virtual routers and their routing rules
      hints:
        readOnly: true
      call: app-mesh.list-virtual-routers
      outputParameters:
      - type: object
        mapping: $.
    - name: list-virtual-gateways
      description: List virtual gateways for ingress traffic management
      hints:
        readOnly: true
      call: app-mesh.list-virtual-gateways
      outputParameters:
      - type: object
        mapping: $.
